<app-table [items]="weapons" [columns]="tableColumns" [sortProperties]="sortProperties"></app-table>

<ng-template #effects let-item>
  <app-tooltiped-list-cell [items]="item.effects" [type]="TooltipTypeEnum.WeaponEffect"></app-tooltiped-list-cell>
</ng-template>
<ng-template #qualities let-item>
  <app-tooltiped-list-cell [items]="item.qualities" [type]="TooltipTypeEnum.WeaponQuality"></app-tooltiped-list-cell>
</ng-template>
